<svg width="830" height="240" viewBox="0 0 830 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="830" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E16"/>
      <stop offset="1" stop-color="#121A2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0B1220"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect width="830" height="240" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="829" height="239" rx="15.5" stroke="#1E293B"/>

  <!-- starfield across full card -->
  <g fill="#94A3B8">
    <circle cx="120" cy="36" r="0.9" opacity="0.25"/>
    <circle cx="310" cy="52" r="0.8" opacity="0.2"/>
    <circle cx="420" cy="200" r="1" opacity="0.25"/>
    <circle cx="480" cy="38" r="1" opacity="0.35"/>
    <circle cx="545" cy="120" r="0.8" opacity="0.25"/>
    <circle cx="585" cy="205" r="1" opacity="0.25"/>
    <circle cx="643" cy="52" r="1.2" opacity="0.3"/>
    <circle cx="705" cy="215" r="1" opacity="0.2"/>
    <circle cx="768" cy="42" r="0.9" opacity="0.3"/>
    <circle cx="795" cy="160" r="1" opacity="0.3"/>
    <circle cx="230" cy="210" r="0.8" opacity="0.2"/>
  </g>

  <!-- event pixels: fire only on change -->
  <g fill="#5EEAD4">
    <rect x="500" y="196" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="608" y="96" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="752" y="78" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.5s" begin="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="560" y="58" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="3.1s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="790" y="196" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.9s" begin="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="368" y="90" width="3" height="3" rx="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="3.6s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- orbit system -->
  <g transform="translate(660,120)">
    <circle cx="0" cy="0" r="110" fill="url(#glow)"/>

    <!-- outer faint ring -->
    <ellipse cx="0" cy="0" rx="104" ry="34" fill="none" stroke="#243146" stroke-width="1" transform="rotate(-14)"/>
    <!-- main dashed ring -->
    <ellipse cx="0" cy="0" rx="76" ry="26" fill="none" stroke="#33415E" stroke-width="1" stroke-dasharray="3 5" transform="rotate(-14)"/>

    <!-- planet -->
    <circle cx="0" cy="0" r="24" fill="url(#planet)" stroke="#334155" stroke-width="1.2"/>
    <path d="M -24 0 A 24 24 0 0 1 24 0" fill="none" stroke="#5EEAD4" stroke-opacity="0.45" stroke-width="1"/>
    <circle cx="-7" cy="-8" r="2.4" fill="#1E293B" stroke="#33415E" stroke-width="0.6"/>
    <circle cx="8" cy="4" r="3.2" fill="#0F172A" stroke="#33415E" stroke-width="0.6"/>

    <!-- debris: inner ring, two dots opposite phases -->
    <g transform="rotate(-14)">
      <circle r="3.6" fill="url(#accent)">
        <animateMotion dur="8s" repeatCount="indefinite"
          path="M 76 0 A 76 26 0 1 1 -76 0 A 76 26 0 1 1 76 0"/>
      </circle>
      <circle r="2" fill="#60A5FA" opacity="0.7">
        <animateMotion dur="8s" begin="-4s" repeatCount="indefinite"
          path="M 76 0 A 76 26 0 1 1 -76 0 A 76 26 0 1 1 76 0"/>
      </circle>
    </g>
    <!-- debris: outer ring, slower -->
    <g transform="rotate(-14)">
      <circle r="2.4" fill="#5EEAD4" opacity="0.8">
        <animateMotion dur="13s" begin="-5s" repeatCount="indefinite"
          path="M 104 0 A 104 34 0 1 1 -104 0 A 104 34 0 1 1 104 0"/>
      </circle>
    </g>
  </g>

  <!-- text -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="56" y="103" fill="#F1F5F9" font-size="44" font-weight="700" letter-spacing="-0.5">Linh Ung</text>
    <rect x="58" y="121" width="44" height="3" rx="1.5" fill="url(#accent)">
      <animate attributeName="width" values="44;58;44" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="56" y="155" fill="#9FB0C3" font-size="17" letter-spacing="0.2">Machine Learning &#38; Software Engineer</text>
    <text x="56" y="183" fill="#64748B" font-size="13.5" letter-spacing="0.3">ADELAIDE, SOUTH AUSTRALIA</text>
  </g>
</svg>
