<svg width="830" height="240" viewBox="0 0 830 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="830" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect width="830" height="240" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="829" height="239" rx="15.5" stroke="#1F2937"/>

  <!-- faint starfield -->
  <g fill="#94A3B8">
    <circle cx="480" cy="40" r="1" opacity="0.35"/>
    <circle cx="560" cy="180" r="1" opacity="0.25"/>
    <circle cx="640" cy="60" r="1.2" opacity="0.3"/>
    <circle cx="770" cy="150" r="1" opacity="0.3"/>
    <circle cx="700" cy="210" r="1" opacity="0.2"/>
    <circle cx="530" cy="110" r="0.8" opacity="0.25"/>
    <circle cx="790" cy="50" r="0.8" opacity="0.3"/>
  </g>

  <!-- event pixels: fire only when something changes -->
  <g fill="#5EEAD4">
    <rect x="500" y="200" width="3" height="3" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="620" y="150" width="3" height="3" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="740" y="90" width="3" height="3" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.5s" begin="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="560" y="70" width="3" height="3" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="3.1s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="800" y="190" width="3" height="3" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.9s" begin="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- orbit system, right side -->
  <g transform="translate(672,120)">
    <circle cx="0" cy="0" r="86" fill="url(#glow)"/>
    <!-- planet -->
    <circle cx="0" cy="0" r="22" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <path d="M -22 0 A 22 22 0 0 1 22 0" fill="none" stroke="#5EEAD4" stroke-opacity="0.5" stroke-width="1"/>
    <!-- orbit ring -->
    <ellipse cx="0" cy="0" rx="78" ry="30" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3 5" transform="rotate(-18)"/>
    <!-- debris on orbit -->
    <g transform="rotate(-18)">
      <circle r="4" fill="url(#accent)">
        <animateMotion dur="7s" repeatCount="indefinite"
          path="M 78 0 A 78 30 0 1 1 -78 0 A 78 30 0 1 1 78 0"/>
      </circle>
      <circle r="2" fill="#60A5FA" opacity="0.6">
        <animateMotion dur="7s" begin="-2.3s" repeatCount="indefinite"
          path="M 78 0 A 78 30 0 1 1 -78 0 A 78 30 0 1 1 78 0"/>
      </circle>
    </g>
  </g>

  <!-- text -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="56" y="105" fill="#F1F5F9" font-size="42" font-weight="700" letter-spacing="-0.5">Linh Ung</text>
    <rect x="58" y="122" width="44" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="56" y="156" fill="#94A3B8" font-size="17">ML Engineer &#183; Neuromorphic Vision Researcher</text>
    <text x="56" y="184" fill="#64748B" font-size="14">Adelaide, South Australia</text>
  </g>
</svg>
